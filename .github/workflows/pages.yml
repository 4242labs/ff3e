name: Deploy demo to GitHub Pages

# Builds the web app in demo mode (fully static, 100% synthetic fixtures —
# no server, no Firefly III instance, no secrets) and publishes web/dist via
# the official Pages artifact/OIDC flow.
#
# This workflow is INERT until an operator enables Pages (Settings → Pages →
# Source: GitHub Actions) for this repository. Until then the deploy job
# fails at the `actions/deploy-pages` step with no publish — merging this
# workflow does not, by itself, put anything live.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; queued runs for the same ref are skipped
# (in-progress ones are not cancelled, so a deploy never lands half-done).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build:demo

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
